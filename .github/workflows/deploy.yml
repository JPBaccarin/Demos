# ============================================================
# Deploy automático no GitHub Pages via vinext (Vite)
# Disparado a cada push na branch "main"
# ============================================================
name: Deploy para GitHub Pages

on:
  push:
    branches:
      - main
  # Permite disparar manualmente pelo painel do GitHub Actions
  workflow_dispatch:

# Permissões necessárias para publicar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy rode por vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build estático com vinext (Vite)
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      # 1. Clona o repositório completo
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Instala o pnpm (versão fixa para evitar incompatibilidades)
      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # 3. Configura o Node.js 22 LTS (SEM cache integrado do setup-node,
      #    pois ele falha ao resolver o store path do pnpm)
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # 4. Descobre o caminho do store do pnpm para o cache manual
      - name: Obter caminho do store pnpm
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      # 5. Cache manual do store do pnpm (substitui o cache do setup-node)
      - name: Cache do store pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('client/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # 6. Configura o GitHub Pages e obtém a URL base
      - name: Configurar GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      # 7. Instala as dependências do projeto
      - name: Instalar dependências
        working-directory: ./client
        run: pnpm install --frozen-lockfile

      # 8. Gera o build estático usando vinext (vite build)
      #    O NEXT_PUBLIC_BASE_PATH é lido pelo next.config.mjs (basePath)
      #    e pelo vite.config.ts (base), garantindo que todos os assets
      #    e rotas funcionem corretamente no subpath do GitHub Pages.
      - name: Build estático com vinext
        working-directory: ./client
        run: pnpm build:vinext
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      # 9. Cria .nojekyll para evitar que o GitHub ignore
      #    diretórios com underscore (ex: _next/) via Jekyll
      - name: Criar .nojekyll
        run: touch ./client/dist/client/.nojekyll

      # 10. Faz upload dos arquivos buildados como artefato do Pages
      - name: Upload artefato para o Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./client/dist/client/

  # ─────────────────────────────────────────
  # Job 2: Deploy no GitHub Pages
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
