# ============================================================
# Deploy automático no GitHub Pages via Next.js (static export)
# Disparado a cada push na branch "master"
# ============================================================
name: Deploy para GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Configurar GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Build estático com Next.js
        run: pnpm build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Preparar diretório de deploy
        run: |
          touch out/.nojekyll
          echo "📦 Conteúdo do diretório de deploy:"
          ls -la out/

      - name: Upload artefato para o Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
