# ============================================================
# Deploy automático no GitHub Pages via Next.js (static export)
# Disparado a cada push na branch "main"
# ============================================================
name: Deploy para GitHub Pages

on:
  push:
    branches:
      - main
  # Permite disparar manualmente pelo painel do GitHub Actions
  workflow_dispatch:

# Permissões necessárias para publicar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy rode por vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build estático com Next.js
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      # 1. Clona o repositório completo
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Instala o pnpm (detecta versão do packageManager se houver)
      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      # 3. Configura o Node.js 22 LTS com cache do pnpm
      #    O cache-dependency-path aponta para o lockfile dentro do monorepo
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "client/pnpm-lock.yaml"

      # 4. Configura o GitHub Pages e obtém a URL base
      - name: Configurar GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      # 5. Instala as dependências do projeto
      - name: Instalar dependências
        working-directory: ./client
        run: pnpm install --frozen-lockfile

      # 6. Gera o build estático com Next.js
      #    O next.config.mjs usa output: 'export', que gera
      #    todos os HTMLs e assets no diretório "out/"
      #    O NEXT_PUBLIC_BASE_PATH configura o basePath para
      #    funcionar corretamente no subpath do GitHub Pages.
      - name: Build estático com Next.js
        working-directory: ./client
        run: pnpm build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      # 7. Cria .nojekyll para evitar que o GitHub processe
      #    arquivos com underscore (ex: _next/) via Jekyll
      - name: Preparar diretório de deploy
        working-directory: ./client
        run: |
          touch out/.nojekyll
          echo "📦 Conteúdo do diretório de deploy:"
          ls -la out/

      # 8. Faz upload dos arquivos buildados como artefato do Pages
      - name: Upload artefato para o Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./client/out/

  # ─────────────────────────────────────────
  # Job 2: Deploy no GitHub Pages
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
