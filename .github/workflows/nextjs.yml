# ============================================================
# Deploy automático no GitHub Pages via vinext (Vite)
# Disparado a cada push na branch "main"
# ============================================================
name: Deploy para GitHub Pages

on:
  push:
    branches:
      - main
  # Permite disparar manualmente pelo painel do GitHub Actions
  workflow_dispatch:

# Permissões necessárias para publicar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy rode por vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build estático com vinext (Vite)
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      # 1. Clona o repositório completo
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Instala o pnpm (detecta versão do packageManager se houver)
      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      # 3. Configura o Node.js 22 LTS com cache do pnpm
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      # 4. Configura o GitHub Pages e obtém a URL base
      - name: Configurar GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      # 5. Instala as dependências do projeto
      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      # 6. Gera o build de produção usando vinext (vite build)
      #    O NEXT_PUBLIC_BASE_PATH é lido pelo next.config.mjs (basePath)
      #    e pelo vite.config.ts (base), garantindo que todos os assets
      #    e rotas funcionem corretamente no subpath do GitHub Pages.
      - name: Build com vinext
        run: pnpm build:vinext
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      # 7. Prepara o diretório final para deploy estático
      #    Cria .nojekyll para evitar que o GitHub processe
      #    arquivos com underscore (ex: assets/) via Jekyll.
      - name: Preparar diretório de deploy
        run: |
          touch dist/client/.nojekyll

          # Fallback: copia index.html se não estiver em dist/client/
          if [ ! -f dist/client/index.html ] && [ -f dist/index.html ]; then
            cp dist/index.html dist/client/
          fi

          echo "📦 Conteúdo do diretório de deploy:"
          ls -la dist/client/

      # 8. Faz upload dos arquivos buildados como artefato do Pages
      - name: Upload artefato para o Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/client/

  # ─────────────────────────────────────────
  # Job 2: Deploy no GitHub Pages
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
